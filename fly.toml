# Fly.io: SQLite needs a persistent volume mounted at /app/data.
# Create the volume before or after first deploy (same region as primary_region):
#   fly volumes create votely_data --region sin --size 1

app = "votely"
primary_region = "sin"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "votely_data"
  destination = "/app/data"
